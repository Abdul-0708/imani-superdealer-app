name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php-lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql
      - name: Lint all PHP files
        run: |
          set -e
          find public_html -name "*.php" -print0 | xargs -0 -n1 php -l

  mysql-integration:
    name: Boot against MySQL
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: imani
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s --health-timeout=5s --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql
      - name: Serve and smoke-test the API
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_NAME: imani
          DB_USER: root
          DB_PASS: root
        run: |
          php -S 127.0.0.1:8080 -t public_html &
          sleep 2
          # health (also creates schema + seeds)
          curl -sf "http://127.0.0.1:8080/api.php?action=health" | grep '"ok":true'
          # login as seeded superadmin
          curl -sf -c /tmp/cj -H "Content-Type: application/json" \
            -d '{"username":"superadmin","password":"imani123"}' \
            "http://127.0.0.1:8080/api.php?action=login" | grep '"superadmin"'
          # authenticated call
          curl -sf -b /tmp/cj "http://127.0.0.1:8080/api.php?action=months" | grep '"open"'
          echo "API smoke OK"
